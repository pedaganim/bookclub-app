<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Library — Redesign Prototype v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .chip-scroll::-webkit-scrollbar { display: none; }
    .chip-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .card-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
    .modal-backdrop { animation: fadeIn 0.15s ease; }
    .modal-panel { animation: slideUp 0.2s ease; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { transform:translateY(20px); opacity:0 } to { transform:translateY(0); opacity:1 } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ══════════════════════════════════════════════
   SAMPLE DATA
══════════════════════════════════════════════ */
const TYPES = [
  { key: 'all',    label: 'All Items', emoji: '🏛️', active: 'bg-indigo-600 text-white' },
  { key: 'books',  label: 'Books',     emoji: '📚', active: 'bg-blue-600   text-white' },
  { key: 'toys',   label: 'Toys',      emoji: '🧸', active: 'bg-pink-500   text-white' },
  { key: 'tools',  label: 'Tools',     emoji: '🔧', active: 'bg-amber-500  text-white' },
  { key: 'games',  label: 'Games',     emoji: '🎲', active: 'bg-green-600  text-white' },
  { key: 'events', label: 'Events',    emoji: '🗓️', active: 'bg-purple-600 text-white' },
];
const TYPE_BADGE = { books:'bg-blue-100 text-blue-700', toys:'bg-pink-100 text-pink-700', tools:'bg-amber-100 text-amber-700', games:'bg-green-100 text-green-700', events:'bg-purple-100 text-purple-700' };
const TYPE_EMOJI = { books:'📚', toys:'🧸', tools:'🔧', games:'🎲', events:'🗓️' };

const CLUBS = [
  { id:'c1', name:'Northside Readers',  members:14, emoji:'📖', color:'bg-blue-100 text-blue-700',   desc:'A cosy book lovers community in the north suburbs.' },
  { id:'c2', name:'Family Swap Circle', members:28, emoji:'🔄', color:'bg-green-100 text-green-700', desc:'Swap toys, tools and games with nearby families.' },
];

const ITEMS = [
  { id:1,  type:'books',  title:'Atomic Habits',       sub:'James Clear',              owner:'Sarah M.',  oi:'S', oc:'bg-blue-100 text-blue-700',   isMine:false, color:'from-blue-400 to-blue-600',     status:'available' },
  { id:2,  type:'toys',   title:'LEGO Classic Set',     sub:'Ages 4+, 500 pieces',      owner:'Tom K.',    oi:'T', oc:'bg-pink-100 text-pink-700',   isMine:false, color:'from-pink-400 to-pink-600',     status:'available' },
  { id:3,  type:'tools',  title:'Bosch Drill',          sub:'Cordless, 18V',            owner:'You',       oi:'Y', oc:'bg-amber-100 text-amber-700', isMine:true,  color:'from-amber-400 to-amber-600',   status:'borrowed'  },
  { id:4,  type:'games',  title:'Catan Board Game',     sub:'Strategy, 3–4 players',    owner:'Priya D.',  oi:'P', oc:'bg-green-100 text-green-700', isMine:false, color:'from-green-400 to-green-600',   status:'available' },
  { id:5,  type:'books',  title:'The Midnight Library', sub:'Matt Haig',                owner:'You',       oi:'Y', oc:'bg-blue-100 text-blue-700',   isMine:true,  color:'from-indigo-400 to-indigo-600', status:'available' },
  { id:6,  type:'events', title:'Bake Sale — May 10',   sub:'Northside Community Hall', owner:'Jake L.',   oi:'J', oc:'bg-purple-100 text-purple-700',isMine:false, color:'from-purple-400 to-purple-600', status:'available' },
  { id:7,  type:'toys',   title:'Wooden Train Set',     sub:'Ages 2+, 60 pieces',       owner:'You',       oi:'Y', oc:'bg-pink-100 text-pink-700',   isMine:true,  color:'from-rose-400 to-rose-600',     status:'available' },
  { id:8,  type:'tools',  title:'Garden Shears',        sub:'Pruning & trimming',       owner:'Anna B.',   oi:'A', oc:'bg-amber-100 text-amber-700', isMine:false, color:'from-yellow-400 to-orange-500', status:'available' },
  { id:9,  type:'books',  title:'Sapiens',              sub:'Yuval Noah Harari',        owner:'Lena T.',   oi:'L', oc:'bg-blue-100 text-blue-700',   isMine:false, color:'from-cyan-400 to-blue-500',     status:'available' },
  { id:10, type:'games',  title:'Ticket to Ride',       sub:'Family, 2–5 players',      owner:'You',       oi:'Y', oc:'bg-green-100 text-green-700', isMine:true,  color:'from-teal-400 to-green-600',    status:'available' },
  { id:11, type:'events', title:'Book Swap — May 18',   sub:'Zoom call, all welcome',   owner:'Sarah M.',  oi:'S', oc:'bg-purple-100 text-purple-700',isMine:false, color:'from-violet-400 to-purple-600', status:'available' },
  { id:12, type:'tools',  title:'Circular Saw',         sub:'Makita, 185mm blade',      owner:'You',       oi:'Y', oc:'bg-amber-100 text-amber-700', isMine:true,  color:'from-orange-400 to-red-500',    status:'available' },
];

const LOST_FOUND = [
  { id:'lf1', kind:'found', title:'Black Water Bottle', desc:'Found near the main hall entrance. Has a small dent on the lid.', date:'Apr 28', club:'Northside Readers', color:'from-teal-400 to-cyan-500',    reportedBy:'Sarah M.', oi:'S', oc:'bg-teal-100 text-teal-700' },
  { id:'lf2', kind:'lost',  title:'Kids Blue Backpack', desc:'Lost at last Tuesday\'s swap event. Has dinosaur keyring attached.', date:'Apr 25', club:'Family Swap Circle', color:'from-rose-400 to-pink-500',  reportedBy:'Tom K.',  oi:'T', oc:'bg-rose-100 text-rose-700'  },
  { id:'lf3', kind:'found', title:'Reading Glasses',    desc:'Found on the bookshelf in row 3. Brown tortoiseshell frame.', date:'Apr 22', club:'Northside Readers', color:'from-amber-400 to-orange-400', reportedBy:'Lena T.', oi:'L', oc:'bg-amber-100 text-amber-700'},
  { id:'lf4', kind:'lost',  title:'Yellow Umbrella',    desc:'Left behind after the April meetup. Has a wooden handle.', date:'Apr 19', club:'Family Swap Circle', color:'from-yellow-400 to-amber-500', reportedBy:'You',     oi:'Y', oc:'bg-yellow-100 text-yellow-700'},
];

/* ══════════════════════════════════════════════
   NAVBAR
══════════════════════════════════════════════ */
function Navbar({ page, setPage, setShowUpload }) {
  const navItems = [['browse','Browse Library'],['my-library','My Library'],['lost-found','Lost & Found'],['clubs','Clubs']];
  const mobileItems = [['browse','🏛️','Browse'],['my-library','📦','Mine'],['lost-found','🧾','L&F'],['clubs','👥','Clubs']];
  return (
    <nav className="bg-white border-b border-gray-100 sticky top-0 z-30 shadow-sm">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div className="flex items-center justify-between h-16">
          <div className="flex items-center gap-6">
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('browse')}>
              <div className="h-8 w-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">CL</div>
              <span className="font-bold text-gray-900 text-sm hidden sm:block">Community Library</span>
            </div>
            <div className="hidden md:flex items-center gap-0.5">
              {navItems.map(([key,label]) => (
                <button key={key} onClick={() => setPage(key)}
                  className={`px-3 py-2 rounded-md text-sm font-medium transition-colors ${page===key ? 'text-indigo-700 bg-indigo-50' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-50'}`}>
                  {key==='lost-found' && <span className="mr-1">🧾</span>}{label}
                </button>
              ))}
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setPage('contact')} className="hidden md:block text-sm text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md hover:bg-gray-50">Contact Us</button>
            <button onClick={() => setShowUpload(true)}
              className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors shadow-sm flex items-center gap-1.5">
              <span className="text-base leading-none">+</span> Add to Library
            </button>
            <div className="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center ml-1">
              <span className="text-xs font-bold text-indigo-700">Y</span>
            </div>
          </div>
        </div>
      </div>
      <div className="md:hidden flex border-t border-gray-100">
        {mobileItems.map(([key,em,label]) => (
          <button key={key} onClick={() => setPage(key)}
            className={`flex-1 flex flex-col items-center py-2 text-xs gap-0.5 transition-colors ${page===key ? 'text-indigo-700 font-semibold' : 'text-gray-500'}`}>
            <span>{em}</span><span>{label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

/* ══════════════════════════════════════════════
   FILTER CHIPS
══════════════════════════════════════════════ */
function FilterChips({ active, setActive }) {
  return (
    <div className="chip-scroll flex gap-2 overflow-x-auto pb-1">
      {TYPES.map(t => (
        <button key={t.key} onClick={() => setActive(t.key)}
          className={`flex-shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium transition-all border ${
            active === t.key ? t.active + ' border-transparent shadow-sm' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'
          }`}>
          <span>{t.emoji}</span><span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════
   ITEM CARD
══════════════════════════════════════════════ */
function ItemCard({ item, showMineActions = false }) {
  const [req, setReq] = useState(false);
  const typeInfo = TYPES.find(t => t.key === item.type);
  return (
    <div className="card-hover bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col">
      <div className={`h-36 bg-gradient-to-br ${item.color} flex items-end p-3 relative`}>
        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full bg-white/90 text-gray-700`}>
          {TYPE_EMOJI[item.type]} {typeInfo?.label}
        </span>
        {item.status === 'borrowed' && (
          <span className="absolute top-2 left-2 text-xs bg-orange-100 text-orange-700 font-semibold px-2 py-0.5 rounded-full">Borrowed out</span>
        )}
      </div>
      <div className="p-3 flex flex-col flex-1">
        <p className="font-semibold text-gray-900 text-sm leading-tight">{item.title}</p>
        <p className="text-xs text-gray-500 mt-0.5 mb-3">{item.sub}</p>
        <div className="mt-auto flex items-center justify-between">
          <div className="flex items-center gap-1.5">
            <div className={`h-5 w-5 rounded-full flex items-center justify-center text-[9px] font-bold ${item.oc}`}>{item.oi}</div>
            <span className="text-xs text-gray-500">{item.owner}</span>
          </div>
          {showMineActions ? (
            <div className="flex gap-1">
              <button className="text-xs px-2 py-1 rounded-lg bg-gray-50 hover:bg-gray-100 text-gray-600 font-medium">Edit</button>
              <button className="text-xs px-2 py-1 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 font-medium">Remove</button>
            </div>
          ) : (
            <button onClick={() => setReq(r => !r)}
              className={`text-xs px-3 py-1.5 rounded-xl font-semibold transition-colors ${req ? 'bg-green-100 text-green-700' : item.status==='borrowed' ? 'bg-gray-100 text-gray-400' : 'bg-indigo-600 hover:bg-indigo-700 text-white'}`}
              disabled={item.status==='borrowed'}>
              {req ? '✓ Requested' : item.status==='borrowed' ? 'Unavailable' : 'Borrow'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   BROWSE LIBRARY PAGE  (excludes own items)
══════════════════════════════════════════════ */
function BrowsePage() {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const othersItems = ITEMS.filter(i => !i.isMine);
  const filtered = othersItems.filter(i =>
    (filter === 'all' || i.type === filter) &&
    (search === '' || i.title.toLowerCase().includes(search.toLowerCase()))
  );
  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div className="mb-5">
        <h1 className="text-2xl font-bold text-gray-900">Browse Library</h1>
        <p className="text-sm text-gray-500 mt-1 flex items-center gap-2 flex-wrap">
          <span className="inline-flex items-center gap-1 bg-green-50 text-green-700 text-xs font-semibold px-2 py-0.5 rounded-full border border-green-100">✓ Your clubs only</span>
          <span>Items from <strong>Northside Readers</strong> &amp; <strong>Family Swap Circle</strong></span>
        </p>
      </div>
      <div className="relative mb-4">
        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
          <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search items in your clubs…"
          className="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm bg-white" />
      </div>
      <div className="mb-5"><FilterChips active={filter} setActive={setFilter} /></div>
      <p className="text-xs text-gray-400 mb-3">{filtered.length} item{filtered.length !== 1 ? 's' : ''}</p>
      {filtered.length === 0 ? (
        <div className="text-center py-20 text-gray-400">
          <div className="text-4xl mb-2">🔍</div>
          <p className="font-medium">No items found</p>
          <p className="text-sm mt-1">Try a different filter or search term</p>
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
          {filtered.map(item => <ItemCard key={item.id} item={item} />)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   MY LIBRARY PAGE
══════════════════════════════════════════════ */
function MyLibraryPage({ setShowUpload }) {
  const [filter, setFilter] = useState('all');
  const myItems = ITEMS.filter(i => i.isMine && (filter === 'all' || i.type === filter));
  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div className="flex items-start justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">My Library</h1>
          <p className="text-sm text-gray-500 mt-1">Everything you've shared with your clubs</p>
        </div>
        <button onClick={() => setShowUpload(true)}
          className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-sm flex items-center gap-2 transition-colors flex-shrink-0">
          <span>+</span> Add to Library
        </button>
      </div>
      {/* Stat tiles — click to filter */}
      <div className="grid grid-cols-3 sm:grid-cols-6 gap-3 mb-5">
        {TYPES.slice(1).map(t => {
          const count = ITEMS.filter(i => i.isMine && i.type === t.key).length;
          return (
            <div key={t.key} onClick={() => setFilter(t.key === filter ? 'all' : t.key)}
              className={`cursor-pointer rounded-2xl p-3 text-center border-2 transition-all ${filter===t.key ? 'border-indigo-400 bg-indigo-50' : 'border-transparent bg-white hover:border-gray-200'}`}>
              <div className="text-xl">{t.emoji}</div>
              <div className="text-lg font-bold text-gray-900 leading-tight">{count}</div>
              <div className="text-[10px] text-gray-500 mt-0.5">{t.label}</div>
            </div>
          );
        })}
      </div>
      <div className="mb-5"><FilterChips active={filter} setActive={setFilter} /></div>
      {myItems.length === 0 ? (
        <div className="text-center py-20 bg-white rounded-2xl border border-gray-100">
          <div className="text-4xl mb-3">📦</div>
          <p className="font-semibold text-gray-700">Nothing here yet</p>
          <p className="text-sm text-gray-400 mt-1 mb-4">Add your first item to share with your clubs</p>
          <button onClick={() => setShowUpload(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700">+ Add to Library</button>
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
          {myItems.map(item => <ItemCard key={item.id} item={item} showMineActions />)}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   LOST & FOUND PAGE
══════════════════════════════════════════════ */
function LostFoundPage() {
  const [tab, setTab] = useState('all');
  const [showReport, setShowReport] = useState(false);
  const [reportKind, setReportKind] = useState('found');
  const [reportSent, setReportSent] = useState(false);

  const filtered = LOST_FOUND.filter(i => tab === 'all' || i.kind === tab);

  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      {/* Header */}
      <div className="flex items-start justify-between mb-5">
        <div>
          <h1 className="text-2xl font-bold text-gray-900">🧾 Lost &amp; Found</h1>
          <p className="text-sm text-gray-500 mt-1">Help reunite items with their owners in your clubs</p>
        </div>
        <button onClick={() => { setShowReport(true); setReportSent(false); }}
          className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2.5 rounded-xl text-sm font-semibold shadow-sm flex items-center gap-2 transition-colors flex-shrink-0">
          + Report Item
        </button>
      </div>

      {/* Tab filter */}
      <div className="flex gap-2 mb-5">
        {[['all','All'],['found','Found 🟢'],['lost','Lost 🔴']].map(([k,l]) => (
          <button key={k} onClick={() => setTab(k)}
            className={`px-4 py-1.5 rounded-full text-sm font-medium border transition-all ${tab===k ? 'bg-rose-600 text-white border-transparent shadow-sm' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'}`}>
            {l}
          </button>
        ))}
      </div>

      {/* Cards */}
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map(item => (
          <div key={item.id} className="card-hover bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col">
            <div className={`h-28 bg-gradient-to-br ${item.color} flex items-start justify-between p-3`}>
              <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${item.kind==='found' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                {item.kind === 'found' ? '✓ Found' : '! Lost'}
              </span>
              <span className="text-xs bg-white/80 text-gray-600 px-2 py-0.5 rounded-full">{item.club}</span>
            </div>
            <div className="p-4 flex flex-col flex-1">
              <p className="font-semibold text-gray-900 text-sm">{item.title}</p>
              <p className="text-xs text-gray-500 mt-1 mb-3 leading-relaxed">{item.desc}</p>
              <div className="mt-auto flex items-center justify-between">
                <div className="flex items-center gap-1.5">
                  <div className={`h-5 w-5 rounded-full flex items-center justify-center text-[9px] font-bold ${item.oc}`}>{item.oi}</div>
                  <span className="text-xs text-gray-400">{item.reportedBy} · {item.date}</span>
                </div>
                <button className="text-xs px-3 py-1.5 rounded-xl font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors">
                  Contact
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Report modal */}
      {showReport && (
        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={() => setShowReport(false)}>
          <div className="modal-panel bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-6 pb-4 border-b border-gray-100">
              <h2 className="text-lg font-bold text-gray-900">🧾 Report an Item</h2>
              <button onClick={() => setShowReport(false)} className="h-8 w-8 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-lg">×</button>
            </div>
            {reportSent ? (
              <div className="p-8 text-center">
                <div className="text-4xl mb-3">✅</div>
                <p className="font-bold text-gray-900">Report Posted!</p>
                <p className="text-sm text-gray-500 mt-1 mb-4">Club members will be notified.</p>
                <button onClick={() => setShowReport(false)} className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl text-sm font-semibold">Done</button>
              </div>
            ) : (
              <div className="p-6 space-y-4">
                <div>
                  <p className="text-sm font-semibold text-gray-700 mb-2">Type</p>
                  <div className="grid grid-cols-2 gap-3">
                    {[['found','I Found Something','🟢'],['lost','I Lost Something','🔴']].map(([v,l,em]) => (
                      <button key={v} onClick={() => setReportKind(v)}
                        className={`p-3 rounded-xl border-2 text-left transition-all ${reportKind===v ? 'border-rose-500 bg-rose-50' : 'border-gray-100 hover:border-gray-200'}`}>
                        <div className="text-xl">{em}</div>
                        <div className={`text-xs font-semibold mt-1 ${reportKind===v ? 'text-rose-700' : 'text-gray-700'}`}>{l}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Item Name *</label>
                  <input placeholder="e.g. Black water bottle" className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Description *</label>
                  <textarea rows={3} placeholder="Describe the item, where it was found/lost, any identifying details…" className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 resize-none" />
                </div>
                <div>

/* ══════════════════════════════════════════════
   UPLOAD MODAL  (generic multi-upload, no type selection)
══════════════════════════════════════════════ */
const FAKE_FILES = [
  { name:'IMG_4823.jpg', emoji:'📚', detected:'Book',  title:'The Great Gatsby',   desc:'F. Scott Fitzgerald, paperback', color:'from-blue-400 to-indigo-500' },
  { name:'IMG_4824.jpg', emoji:'🧸', detected:'Toy',   title:'Wooden Train Set',    desc:'Ages 2+, 60 pieces, good condition', color:'from-pink-400 to-rose-500' },
  { name:'IMG_4825.jpg', emoji:'🎲', detected:'Game',  title:'Catan Board Game',    desc:'Strategy, 3–4 players, complete', color:'from-green-400 to-teal-500' },
];

function UploadModal({ onClose }) {
  const [files, setFiles] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [processed, setProcessed] = useState([]);
  const [published, setPublished] = useState(false);

  const handleAdd = () => {
    const count = Math.floor(Math.random() * 2) + 1;
    const newFiles = FAKE_FILES.slice(0, count).map((f,i) => ({ ...f, id: Date.now()+i, status:'queued' }));
    const merged = [...files, ...newFiles].slice(0, 5);
    setFiles(merged);
  };

  const handleProcess = () => {
    if (files.length === 0) return;
    setProcessing(true);
    setProcessed([]);
    let idx = 0;
    const tick = () => {
      if (idx >= files.length) { setProcessing(false); return; }
      setProcessed(p => [...p, files[idx].id]);
      idx++;
      setTimeout(tick, 800);
    };
    setTimeout(tick, 600);
  };

  const allDone = !processing && processed.length === files.length && files.length > 0;

  return (
    <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={onClose}>
      <div className="modal-panel bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-6 pb-4 border-b border-gray-100 sticky top-0 bg-white z-10">
          <div>
            <h2 className="text-lg font-bold text-gray-900">Add to Library</h2>
            <p className="text-xs text-gray-400 mt-0.5">Take or upload photos — AI identifies &amp; categorises automatically</p>
          </div>
          <button onClick={onClose} className="h-8 w-8 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-lg">×</button>
        </div>

        <div className="p-6">
          {published ? (
            <div className="text-center py-8">
              <div className="text-5xl mb-3">🎉</div>
              <p className="font-bold text-gray-900 text-lg">Published!</p>
              <p className="text-sm text-gray-500 mt-1 mb-5">{files.length} item{files.length>1?'s':''} added to your library</p>
              <button onClick={onClose} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold text-sm shadow-sm hover:bg-indigo-700">Done</button>
            </div>
          ) : (
            <>
              {/* Drop zone */}
              <div onClick={handleAdd}
                className="border-2 border-dashed border-indigo-200 hover:border-indigo-400 bg-indigo-50/40 hover:bg-indigo-50 rounded-2xl p-8 text-center cursor-pointer transition-all mb-5">
                <div className="text-4xl mb-2">📷</div>
                <p className="font-semibold text-gray-700 text-sm">Tap to take a photo or choose from gallery</p>
                <p className="text-xs text-gray-400 mt-1">Add multiple items at once — up to 10 photos</p>
                <div className="mt-3 inline-flex items-center gap-2 bg-indigo-600 text-white px-5 py-2 rounded-xl text-sm font-semibold shadow-sm">
                  Choose Photos
                </div>
              </div>

              {/* File queue */}
              {files.length > 0 && (
                <div className="space-y-2 mb-5">
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{files.length} photo{files.length>1?'s':''} selected</p>
                  {files.map((f) => {
                    const isDone = processed.includes(f.id);
                    const isActive = processing && !isDone && processed.length === files.indexOf(f);
                    return (
                      <div key={f.id} className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${isDone ? 'bg-green-50 border-green-100' : isActive ? 'bg-indigo-50 border-indigo-100' : 'bg-gray-50 border-gray-100'}`}>
                        <div className={`h-10 w-10 rounded-xl bg-gradient-to-br ${f.color} flex items-center justify-center text-lg flex-shrink-0`}>{f.emoji}</div>
                        <div className="flex-1 min-w-0">
                          {isDone ? (
                            <>
                              <p className="text-sm font-semibold text-gray-900 truncate">{f.title}</p>
                              <p className="text-xs text-gray-500 truncate">{f.emoji} {f.detected} · {f.desc}</p>
                            </>
                          ) : (
                            <>
                              <p className="text-sm font-medium text-gray-600 truncate">{f.name}</p>
                              <p className="text-xs text-gray-400">{isActive ? 'Analysing…' : 'Queued'}</p>
                            </>
                          )}
                        </div>
                        <div className="flex-shrink-0">
                          {isDone ? (
                            <span className="text-green-500 text-lg">✓</span>
                          ) : isActive ? (
                            <div className="h-5 w-5 border-2 border-indigo-300 border-t-indigo-600 rounded-full animate-spin" />
                          ) : (
                            <button onClick={e => { e.stopPropagation(); setFiles(fs => fs.filter(x=>x.id!==f.id)); }} className="text-gray-300 hover:text-red-400 text-sm">✕</button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Action buttons */}
              {files.length === 0 ? null : allDone ? (
                <div>
                  <div className="rounded-xl bg-green-50 border border-green-100 p-3 mb-4 flex items-center gap-2">
                    <span className="text-xl">✅</span>
                    <p className="text-sm font-semibold text-green-800">All items identified! Review and publish below.</p>
                  </div>
                  <button onClick={() => setPublished(true)} className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold text-sm shadow-sm transition-colors">
                    ✓ Publish {files.length} Item{files.length>1?'s':''} to Library
                  </button>
                </div>
              ) : (
                <button onClick={handleProcess} disabled={processing}
                  className={`w-full py-3 rounded-xl font-semibold text-sm transition-colors ${processing ? 'bg-indigo-100 text-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm'}`}>
                  {processing ? 'AI is analysing your photos…' : `Analyse ${files.length} Photo${files.length>1?'s':''} with AI`}
                </button>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('browse');
  const [showUpload, setShowUpload] = useState(false);

  const renderPage = () => {
    switch(page) {
      case 'browse':     return <BrowsePage />;
      case 'my-library': return <MyLibraryPage setShowUpload={setShowUpload} />;
      case 'lost-found': return <LostFoundPage />;
      case 'clubs':      return <ClubsPage setPage={setPage} />;
      case 'contact':    return <ContactPage />;
      default:           return <BrowsePage />;
    }
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <Navbar page={page} setPage={setPage} setShowUpload={setShowUpload} />
      <main className="pb-24 md:pb-0">{renderPage()}</main>
      {showUpload && <UploadModal onClose={() => setShowUpload(false)} />}
      <div className="fixed bottom-4 right-4 bg-black/70 text-white text-xs px-3 py-1.5 rounded-full backdrop-blur-sm z-40 pointer-events-none">
        🎨 Prototype v2 — click to explore
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
