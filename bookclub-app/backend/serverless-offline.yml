service: bookclub-app
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${self:custom.appConfig.region}
  environment:
    STAGE: ${self:provider.stage}
    # These will be mocked in local development
    COGNITO_USER_POOL_ID: ${opt:cognito-user-pool-id, 'local-user-pool'}
    COGNITO_CLIENT_ID: ${opt:cognito-client-id, 'local-client-id'}
    BOOK_COVERS_BUCKET: ${self:service}-${self:provider.stage}-book-covers

custom:
  appConfig: ${file(./config/app.${self:provider.stage}.json)}
  serverless-offline:
    httpPort: 4000
    # Skip resource routes for local development
    resourceRoutes: false
    # Disable external requests during offline development
    skipCacheInvalidation: true
    disableCookieValidation: true
    noAuth: true
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true

plugins:
  - serverless-offline

functions:
  # Book-related functions
  createBook:
    handler: src/handlers/books/create.handler
    events:
      - http:
          method: POST
          path: /books
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  getBook:
    handler: src/handlers/books/get.handler
    events:
      - http:
          method: GET
          path: /books/{bookId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  listBooks:
    handler: src/handlers/books/list.handler
    events:
      - http:
          method: GET
          path: /books
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  updateBook:
    handler: src/handlers/books/update.handler
    events:
      - http:
          method: PUT
          path: /books/{bookId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  deleteBook:
    handler: src/handlers/books/delete.handler
    events:
      - http:
          method: DELETE
          path: /books/{bookId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  # User-related functions
  registerUser:
    handler: src/handlers/users/register.handler
    events:
      - http:
          method: POST
          path: /auth/register
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  loginUser:
    handler: src/handlers/users/login.handler
    events:
      - http:
          method: POST
          path: /auth/login
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  getUserProfile:
    handler: src/handlers/users/getProfile.handler
    events:
      - http:
          method: GET
          path: /users/me
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true
  
  # File upload
  generateUploadUrl:
    handler: src/handlers/files/generateUploadUrl.handler
    events:
      - http:
          method: POST
          path: /upload-url
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  # Club-related functions — static paths MUST come before {clubId} wildcard
  createClub:
    handler: src/handlers/clubs/create.handler
    events:
      - http:
          method: POST
          path: /clubs
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  listUserClubs:
    handler: src/handlers/clubs/list.handler
    events:
      - http:
          method: GET
          path: /clubs
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  browseClubs:
    handler: src/handlers/clubs/browse.handler
    events:
      - http:
          method: GET
          path: /clubs/browse
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  joinClub:
    handler: src/handlers/clubs/join.handler
    events:
      - http:
          method: POST
          path: /clubs/join
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  resolveClubSlug:
    handler: src/handlers/clubs/resolveSlug.handler
    events:
      - http:
          method: GET
          path: /clubs/resolve/{slug}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  getClub:
    handler: src/handlers/clubs/get.handler
    events:
      - http:
          method: GET
          path: /clubs/{clubId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  leaveClub:
    handler: src/handlers/clubs/leave.handler
    events:
      - http:
          method: DELETE
          path: /clubs/{clubId}/leave
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  requestClubJoin:
    handler: src/handlers/clubs/request.handler
    events:
      - http:
          method: POST
          path: /clubs/{clubId}/request
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Amz-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  updateClub:
    handler: src/handlers/clubs/update.handler
    events:
      - http:
          method: PATCH
          path: /clubs/{clubId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Amz-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  deleteClub:
    handler: src/handlers/clubs/delete.handler
    events:
      - http:
          method: DELETE
          path: /clubs/{clubId}
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Amz-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  # Direct Messages (DM)
  dmCreateConversation:
    handler: src/handlers/dm/createConversation.handler
    events:
      - http:
          method: POST
          path: /dm/conversations
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  dmListConversations:
    handler: src/handlers/dm/listConversations.handler
    events:
      - http:
          method: GET
          path: /dm/conversations
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  dmSendMessage:
    handler: src/handlers/dm/sendMessage.handler
    events:
      - http:
          method: POST
          path: /dm/conversations/{conversationId}/messages
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  dmListMessages:
    handler: src/handlers/dm/listMessages.handler
    events:
      - http:
          method: GET
          path: /dm/conversations/{conversationId}/messages
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true

  dmMarkRead:
    handler: src/handlers/dm/markRead.handler
    events:
      - http:
          method: PATCH
          path: /dm/conversations/{conversationId}/read
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: true